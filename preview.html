<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clair'Optique</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="brand">
          <span>Clair'Optique</span>
        </div>
        <nav class="main-nav" aria-label="Navigation principale">
            <a href="/" data-link>Accueil</a>
            <a href="/products" data-link>Collections</a>
            <a href="/verres" data-link>Verres</a>
            <a href="/about" data-link>À propos</a>
            <a href="/contact" data-link>Contact</a>
        </nav>
      </header>
      <main id="app"></main>
      <footer class="footer">
        <div class="container footer-content">
          <p>Clair'Optique</p>
          <p>Lunettes de qualité, commande simple, prix abordables.</p>
        </div>
      </footer>
    </div>

    <script type="module">
      import { products } from "/src/data/products.js";

      const app = document.querySelector("#app");
      const phone = "213559925559";
      const filters = ["Tous", "Médicales", "Solaires", "Homme", "Femme", "Enfant"];
      let searchTerm = "";
      let activeFilter = "Tous";

      function whatsapp(name) {
        return `https://wa.me/${phone}?text=Bonjour,%20je%20veux%20commander:%20${encodeURIComponent(name)}`;
      }

      function productPlaceholder(name) {
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
            <rect width="900" height="600" fill="#f6f7f9"/>
            <rect x="84" y="84" width="732" height="432" rx="28" fill="#ffffff" stroke="#e6e9ee" stroke-width="4"/>
            <path d="M210 306c32-70 148-68 184-8 19 32 14 83-20 108-45 34-132 22-158-32-10-22-12-47-6-68Z" fill="none" stroke="#111318" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M506 298c36-60 152-62 184 8 6 21 4 46-6 68-26 54-113 66-158 32-34-25-39-76-20-108Z" fill="none" stroke="#111318" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M392 320c32-22 84-22 116 0" fill="none" stroke="#111318" stroke-width="22" stroke-linecap="round"/>
            <text x="450" y="505" text-anchor="middle" fill="#111318" font-family="Arial, sans-serif" font-size="34" font-weight="700">${name}</text>
          </svg>
        `;

        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      }

      function wireImageFallbacks() {
        document.querySelectorAll("img[data-product-name]").forEach((image) => {
          image.addEventListener("error", () => {
            if (!image.src.startsWith("data:image/svg+xml")) {
              image.src = productPlaceholder(image.dataset.productName);
            }
          });
        });
      }

      function setActiveNav() {
        document.querySelectorAll(".nav-links a").forEach((link) => {
          const href = link.getAttribute("href");
          const active =
            href === "/"
              ? location.pathname === "/"
              : location.pathname.startsWith(href);
          link.classList.toggle("active", active);
        });
      }

      function productCard(product) {
        return `
          <article class="product-card">
            <a href="/products/${product.id}" class="product-image-link" data-link>
              <img
                src="/images/logo.png"
                alt="Clair'Optique"
                class="product-logo-badge"
              />
              <img src="${product.image}" alt="${product.name}" class="product-image" data-product-name="${product.name}" />
            </a>
            <div class="product-card-body">
              <div>
                <p class="eyebrow">${product.category} / ${product.gender}</p>
                <h3>${product.name}</h3>
                <p class="product-brand">Marque : ${product.brand}</p>
                <p class="product-price">${product.price.toLocaleString()} DA</p>
              </div>
              <div class="card-actions">
                <a class="btn btn-secondary" href="/products/${product.id}" data-link>Voir détails</a>
                <a class="btn btn-primary" href="${whatsapp(product.name)}" target="_blank" rel="noreferrer">Commander</a>
              </div>
            </div>
          </article>
        `;
      }

      function home() {
        app.innerHTML = `
          <section class="hero">
            <div class="container hero-grid">
              <div class="hero-copy">
                <p class="eyebrow">Clair'Optique</p>
                <h1>Trouvez les lunettes parfaites</h1>
                <p class="hero-subtitle">Lunettes optiques et solaires modernes aux meilleurs prix</p>
                <div class="hero-actions">
                  <a class="btn btn-primary hero-button" href="/products" data-link>Voir les produits</a>
                </div>
              </div>
              <div class="hero-visual">
                <img src="/images/products/lunette-medicale-noire.jpg" alt="Lunettes optiques noires" class="hero-product hero-product-main" data-product-name="Lunettes optiques noires" />
                <img src="/images/products/lunette-soleil-femme.jpg" alt="Lunettes solaires femme" class="hero-product hero-product-small" data-product-name="Lunettes solaires femme" />
              </div>
            </div>
          </section>
          <section class="section">
            <div class="container">
              <div class="section-heading">
                <p class="eyebrow">Pourquoi nous choisir</p>
                <h2>Un service simple, des montures de qualité</h2>
              </div>
              <div class="advantages-grid">
                ${["Montures de qualité", "Prix abordables", "Commande rapide sur WhatsApp"]
                  .map(
                    (item) => `
                      <article class="advantage-card">
                        <span class="check-icon" aria-hidden="true">Oui</span>
                        <h3>${item}</h3>
                      </article>
                    `,
                  )
                  .join("")}
              </div>
            </div>
          </section>
          <section class="section featured-section">
            <div class="container">
              <div class="section-heading section-heading-row">
                <div>
                  <p class="eyebrow">Produits en vedette</p>
                  <h2>Lunettes populaires</h2>
                </div>
                <a class="btn btn-secondary" href="/products" data-link>Voir tous les produits</a>
              </div>
              <div class="products-grid">
                ${products.slice(0, 3).map(productCard).join("")}
              </div>
            </div>
          </section>
        `;
      }

      function productsPage() {
        const filtered = products.filter((product) => {
          const matchesSearch = product.name
            .toLowerCase()
            .includes(searchTerm.trim().toLowerCase());
          const matchesFilter =
            activeFilter === "Tous" ||
            product.category === activeFilter ||
            product.gender === activeFilter;
          return matchesSearch && matchesFilter;
        });

        app.innerHTML = `
          <section class="section page-section">
            <div class="container">
              <div class="page-heading">
                <p class="eyebrow">Catalogue</p>
                <h1>Produits</h1>
                <p>Découvrez nos lunettes médicales, solaires et montures modernes.</p>
              </div>
              <div class="catalogue-toolbar">
                <label class="search-label" for="product-search">Rechercher des produits</label>
                <input id="product-search" type="search" placeholder="Rechercher par nom de produit..." value="${searchTerm}" />
              </div>
              <div class="filter-row" aria-label="Filtres des produits">
                ${filters
                  .map(
                    (filter) => `
                      <button class="${filter === activeFilter ? "filter active" : "filter"}" type="button" data-filter="${filter}">
                        ${filter}
                      </button>
                    `,
                  )
                  .join("")}
              </div>
              ${
                filtered.length
                  ? `<div class="products-grid">${filtered.map(productCard).join("")}</div>`
                  : `<div class="empty-state"><h2>Aucun produit trouvé</h2><p>Essayez une autre recherche ou une autre catégorie.</p></div>`
              }
            </div>
          </section>
        `;

        document.querySelector("#product-search").addEventListener("input", (event) => {
          searchTerm = event.target.value;
          productsPage();
        });

        document.querySelectorAll("[data-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            activeFilter = button.dataset.filter;
            productsPage();
          });
        });
      }

      function productDetails(id) {
        const product = products.find((item) => item.id === Number(id));

        if (!product) {
          app.innerHTML = `
            <section class="section page-section">
              <div class="container empty-state">
                <h1>Produit introuvable</h1>
                <p>Le produit recherché n'est pas disponible.</p>
                <a class="btn btn-primary" href="/products" data-link>Retour aux produits</a>
              </div>
            </section>
          `;
          return;
        }

        app.innerHTML = `
          <section class="section page-section">
            <div class="container">
              <div class="details-nav" aria-label="Navigation produit">
                <a class="details-back-button" href="/products" data-link aria-label="Retour">←</a>
              </div>

              <div class="details-grid">
              <div class="details-image-wrap">
                <img src="${product.image}" alt="${product.name}" class="details-image" data-product-name="${product.name}" />
              </div>
              <div class="details-content">
                <p class="eyebrow">${product.category} / ${product.gender}</p>
                <h1>${product.name}</h1>
                <p class="details-price">${product.price.toLocaleString()} DA</p>
                <p class="details-description">${product.description}</p>
                <dl class="details-list">
                  <div><dt>Marque</dt><dd>${product.brand}</dd></div>
                  <div><dt>Catégorie</dt><dd>${product.category}</dd></div>
                  <div><dt>Couleur</dt><dd>${product.color}</dd></div>
                  <div>
                    <dt>Disponibilité</dt>
                    <dd class="${product.stock ? "stock-in" : "stock-out"}">${product.stock ? "En stock" : "Rupture de stock"}</dd>
                  </div>
                </dl>
                <div class="details-actions">
                  <a class="btn btn-primary" href="${whatsapp(product.name)}" target="_blank" rel="noreferrer">Commander maintenant sur WhatsApp</a>
                </div>
              </div>
            </div>
            </div>
          </section>
        `;
      }

      function contact() {
        app.innerHTML = `
          <section class="section page-section">
            <div class="container contact-grid">
              <div class="page-heading contact-heading">
                <p class="eyebrow">Contact</p>
                <h1>Visitez ou contactez Clair'Optique</h1>
                <p>Pour la disponibilité, les prix et les commandes rapides, contactez-nous par téléphone ou WhatsApp.</p>
              </div>
              <div class="contact-panel">
                <div class="contact-item"><span>Téléphone</span><strong>0559 92 55 59</strong></div>
                <div class="contact-item">
                  <span>WhatsApp</span>
                  <a class="btn btn-primary" href="https://wa.me/${phone}?text=Bonjour,%20je%20veux%20vous%20contacter%20pour%20des%20lunettes" target="_blank" rel="noreferrer">Contacter sur WhatsApp</a>
                </div>
                <div class="contact-item">
                  <span>Adresse</span>
                  <strong>Algérie, rue principale, Clair'Optique</strong>
                </div>
                <div class="contact-item"><span>Horaires d'ouverture</span><strong>Du samedi au jeudi, 9:00 - 18:00</strong></div>
              </div>
            </div>
          </section>
        `;
      }

      function render() {
        const productMatch = location.pathname.match(/^\/products\/(\d+)$/);
        setActiveNav();

        if (location.pathname === "/") home();
        else if (location.pathname === "/products") productsPage();
        else if (productMatch) productDetails(productMatch[1]);
        else if (location.pathname === "/contact") contact();
        else home();

        wireImageFallbacks();
      }

      document.addEventListener("click", (event) => {
        const link = event.target.closest("[data-link]");
        if (!link) return;
        event.preventDefault();
        history.pushState(null, "", link.getAttribute("href"));
        render();
        scrollTo({ top: 0, behavior: "smooth" });
      });

      addEventListener("popstate", render);
      render();
    </script>
  </body>
</html>
